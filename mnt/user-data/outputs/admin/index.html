  <style>
    body {
      margin: 0;

<body>
  <!--
    Decap CMS Admin Panel
    ─────────────────────
    This page loads the Decap CMS UI.
    Users must authenticate via GitHub or Netlify Identity.

    SETUP STEPS:
    1. Push this project to a GitHub repository
    2. Deploy on Netlify (free tier works)
    3. Enable "Netlify Identity" in Netlify dashboard
    4. Enable "Git Gateway" in Identity settings
    5. Invite yourself as a user in Identity
    6. Visit /admin on your deployed site and log in

    For GitHub Pages (without Netlify):
    - Use the GitHub backend in config.yml
    - Set up a GitHub OAuth App
    - See: https://decapcms.org/docs/github-backend/
  -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
