# ================================================================
# Decap CMS — admin/config.yml
# Rashqyiiiiee · Blog Content Management
# ================================================================
#
# SETUP GUIDE (choose ONE backend):
#
# ── OPTION A: Netlify (recommended, easiest) ──────────────────
# 1. Push this project to GitHub
# 2. Connect repo to Netlify (free tier)
# 3. Enable "Netlify Identity" in Netlify dashboard → Identity
# 4. Enable "Git Gateway" in Identity → Services
# 5. Invite yourself as a user in Identity → Invite users
# 6. Visit yoursite.netlify.app/admin → log in
# 7. Start writing!
#
# ── OPTION B: GitHub Pages (direct GitHub OAuth) ─────────────
# 1. Create a GitHub OAuth App at:
#    github.com/settings/developers → OAuth Apps → New OAuth App
#    - Homepage URL: https://USERNAME.github.io/REPO
#    - Callback URL: https://api.netlify.com/auth/done
# 2. Set client_id below
# 3. Deploy the site to GitHub Pages
# 4. Visit yourusername.github.io/REPO/admin
#
# ================================================================

# ── Backend (Netlify Identity + Git Gateway) ─────────────────
backend:
  name: git-gateway
  branch: main          # change to "master" if your default branch is master
  commit_messages:
    create:  'blog: add "{{title}}"'
    update:  'blog: update "{{title}}"'
    delete:  'blog: delete "{{title}}"'
    uploadMedia:  'assets: upload "{{path}}"'
    deleteMedia:  'assets: delete "{{path}}"'

# ── Uncomment for GitHub Pages (Option B) ────────────────────
# backend:
#   name: github
#   repo: YOUR-USERNAME/YOUR-REPO-NAME   # e.g. rashq/rashqyiiiiee
#   branch: main

# ── Media / images ───────────────────────────────────────────
media_folder:  "images/uploads"       # where uploaded images are stored
public_folder: "/images/uploads"      # public URL path for images

# ── Site URL (update to your actual URL) ─────────────────────
# site_url: https://yoursite.com
# display_url: https://yoursite.com

# ── UI settings ───────────────────────────────────────────────
locale: en
show_preview_links: true

# ================================================================
# COLLECTIONS
# ================================================================
collections:

  # ── Blog Posts ────────────────────────────────────────────────
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "content/posts"
    create: true
    delete: true
    slug: "{{id}}"
    preview_path: "post.html?id={{id}}"
    summary: "{{title}} · {{date}} · {{category}}"
    sortable_fields: ["date", "title", "category"]
    view_filters:
      - label: "Featured"
        field: "featured"
        pattern: true
      - label: "Thoughts"
        field: "category"
        pattern: "thoughts"
      - label: "Anime"
        field: "category"
        pattern: "anime"
      - label: "Coding"
        field: "category"
        pattern: "coding"

    fields:

      - label: "Post ID"
        name: "id"
        widget: "number"
        hint: "Unique numeric ID. Use the next available number."
        value_type: "int"

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The post title shown on blog cards and the post page."

      - label: "Preview / Excerpt"
        name: "preview"
        widget: "text"
        hint: "Short preview shown on blog cards (1–2 sentences)."

      - label: "Full Content"
        name: "content"
        widget: "markdown"
        hint: "The full post body. Supports markdown."
        editor_components: ["image", "code-block"]

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "MMMM D, YYYY"
        date_format: "MMMM D, YYYY"
        time_format: false
        hint: "Display date shown on the post."

      - label: "Reading Time"
        name: "readTime"
        widget: "string"
        default: "4 min read"
        hint: "Estimated reading time, e.g. '4 min read'."

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Thoughts", value: "thoughts" }
          - { label: "Anime",    value: "anime" }
          - { label: "Coding",   value: "coding" }
          - { label: "Stories",  value: "stories" }
          - { label: "Life",     value: "life" }
          - { label: "Uncrossed Paths", value: "uncrossed-paths" }
        hint: "Main category for filter tabs."

      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Additional tags, e.g. thoughts, internet, loneliness."
        field:
          label: Tag
          name: tag
          widget: string

      - label: "Featured / Pinned"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show this post in the Featured section at the top of the blog."

      - label: "Like Count"
        name: "likes"
        widget: "number"
        default: 0
        hint: "Initial like count displayed on cards."
        value_type: "int"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        allow_multiple: false
        hint: "Optional cover image for the post."

  # ── Site Settings (data.json sections) ────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - label: "Late Night Thoughts"
        name: "lateNightThoughts"
        file: "_data/lnt.json"
        fields:
          - label: "Thoughts"
            name: "lateNightThoughts"
            widget: "list"
            allow_add: true
            hint: "Rotating quotes shown in the Late Night Thoughts section."
            field:
              label: "Thought"
              name: "thought"
              widget: "string"

      - label: "Currently Section"
        name: "currently"
        file: "_data/currently.json"
        fields:
          - label: "Watching"
            name: "watching"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Watching" }
              - { label: "Icon",  name: "icon",  widget: "string", default: "▶" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "Building"
            name: "building"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Building" }
              - { label: "Icon",  name: "icon",  widget: "string", default: "◈" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "Learning"
            name: "learning"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Learning" }
              - { label: "Icon",  name: "icon",  widget: "string", default: "◎" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "Listening To"
            name: "listening"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Listening To" }
              - { label: "Icon",  name: "icon",  widget: "string", default: "♪" }
              - { label: "Value", name: "value", widget: "string" }
