<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>

</head>
<body data-page="post">

<div id="loader" aria-hidden="true">
  <div class="loader-name">RashYaps</div>
  <div class="loader-bar"></div>
</div>
<div id="page-veil" class="show"></div>
<div id="theme-veil"></div>
<div class="grain-layer" aria-hidden="true"></div>

<nav class="mobile-nav" aria-label="Mobile navigation">
  <button class="mob-close" aria-label="Close">✕</button>
  <a href="index.html">Home</a>
  <a href="blog.html">Blog</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<header class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Rashqyiiiiee</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
      <a href="index.html#projects">Projects</a>
      <a href="contact.html" class="nav-pill">Say hi</a>
    </nav>
    <div class="nav-right">
      <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">
        <span class="theme-btn-icon" id="theme-icon">🌙</span>
      </button>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<main class="post-wrap">
  <div class="post-col">

    <a href="blog.html" class="post-back reveal">← back to RashYaps</a>

    <!-- Post content injected by JS -->
    <div id="post-area" class="reveal d1">
      <div style="text-align:center;padding:80px 0;color:var(--text-m)">
        <div style="font-size:32px;margin-bottom:14px;opacity:.35;font-family:var(--ff-d);font-style:italic">◌</div>
        <p style="font-size:14px">Loading post…</p>
      </div>
    </div>

    <!-- ══ COMMENTS ══════════════════════════════════════════ -->
    <div class="comments-area">
      <div class="comments-hdr">
        <h2 class="comments-title">Comments</h2>
        <span class="c-count-badge" id="c-count-badge">—</span>
      </div>

      <!-- Comment form -->
      <form class="c-form-card" id="comment-form" novalidate>
        <p class="cf-lbl">Leave a thought</p>
        <div class="cf-row">
          <input type="text"  id="c-name"  class="input-base" placeholder="Your name"         required/>
          <input type="email" id="c-email" class="input-base" placeholder="Email (not shown)"/>
        </div>
        <textarea id="c-msg" class="input-base" rows="3" placeholder="What did this make you think?" required></textarea>
        <button type="submit" class="btn btn-outline btn-sm" style="align-self:flex-start">Post comment →</button>
      </form>

      <!-- Comment list -->
      <div class="c-list" id="comment-list"></div>
    </div>

    <!-- Footer nav -->
    <div style="display:flex;justify-content:space-between;padding:44px 0;border-top:1px solid var(--border);margin-top:8px;gap:14px;flex-wrap:wrap">
      <a href="blog.html" class="btn btn-ghost btn-sm">← All posts</a>
      <a href="contact.html" class="btn btn-outline btn-sm">Get in touch</a>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container footer-row">
    <a href="index.html" class="footer-logo">Rashqyiiiiee</a>
    <p class="footer-copy">© 2025 Rashqyiiiiee · <span style="color:var(--a-blue)">RashYaps</span></p>
    <div class="footer-soc">
      <a href="https://youtube.com/@Rashqyiiiiee"  target="_blank" rel="noopener" aria-label="YouTube">▶</a>
      <a href="https://instagram.com/Rashqyiiiiee" target="_blank" rel="noopener" aria-label="Instagram">◎</a>
      <a href="https://twitter.com/Rashqyiiiiee"   target="_blank" rel="noopener" aria-label="Twitter">𝕏</a>
      <a href="https://discord.gg/Rashqyiiiiee"    target="_blank" rel="noopener" aria-label="Discord">◈</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
